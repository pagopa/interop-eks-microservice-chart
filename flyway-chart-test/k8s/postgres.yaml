---
apiVersion: v1
kind: Secret
metadata:
  name: flyway-db-secret
  namespace: flyway-chart-test
type: Opaque
stringData:
  username: flyway
  password: flyway_secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: flyway-chart-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      volumes:
        - name: pgdata
          emptyDir:
            medium: Memory
            sizeLimit: "256Mi"
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: testdb
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: flyway-db-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flyway-db-secret
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "flyway", "-d", "testdb"]
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: flyway-chart-test
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432