name: test-flyway-configmap

deployment:
  flywayInitContainer:
    create: true
    image:
      repositoryPrefix: "flyway"
      repositoryName: "flyway"
      tag: "latest"
    migrationsConfigmap: flyway-migrations-configmap
    executeFlywayMigrate: true
    executeFlywayRepair: false
    downloadRedshiftDriver: false
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    envFromSecrets:
      FLYWAY_USER:     "flyway-db-secret.username"
      FLYWAY_PASSWORD: "flyway-db-secret.password"
    env:
      FLYWAY_URL: "jdbc:postgresql://postgres:5432/testdb"
      FLYWAY_CONNECT_RETRIES: "10"
