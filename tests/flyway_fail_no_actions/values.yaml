# Test case EXPECTED TO FAIL (helm lint/template deve fallire).
#
# Verifica il caso limite in cui sia executeFlywayMigrate che executeFlywayRepair
# sono impostati a false: la chart deve produrre un errore tramite `fail` con:
#   "Invalid configuration: Both executeFlywayMigrate and executeFlywayRepair in
#    the flywayInitContainer are false."
name: "flyway-no-actions-service"
namespace: "test-namespace"
techStack: "nodejs"

serviceAccount:
  roleArn: "arn:aws:iam::000000000:role/flyway-no-actions-service"

service:
  create: true
  containerPort: 8080
  portName: http

deployment:
  replicas: 1
  image:
    repositoryPrefix: "000000000000.dkr.ecr.eu-central-1.amazonaws.com"
    tag: "1.0.0"
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  flywayInitContainer:
    create: true
    image:
      repositoryName: "interop-flyway-migrations"
    # MISCONFIGURATION: both actions disabled -> chart must fail
    executeFlywayMigrate: false
    executeFlywayRepair: false
    migrationPaths: "/flyway_fail_no_actions/migrations/v1_migrations"
    envFromSecrets:
      FLYWAY_USER: "postgres-secret.POSTGRES_USR"
      FLYWAY_PASSWORD: "postgres-secret.POSTGRES_PSW"
