# Test case: Default secret names - when targetSecret.name is not provided
# Expects: Default name for container = service name
#          Default name for initContainer = service name with "-flyway" suffix

externalSecrets:
  container:
    create: true
    refreshInterval: "1h"
    refreshPolicy: "OnChange"
    secretStoreRef:
      name: app-secret-store
      kind: SecretStore
    targetSecret:
      name: ""  # Empty, should default to .Values.name (test-svc)
      creationPolicy: Merge
      deletionPolicy: Retain
    data:
      - secretKey: API_KEY
        remoteRef:
          key: /app/secrets
          property: api-key
  initContainer:
    create: true
    refreshInterval: "30m"
    refreshPolicy: "Interval"
    secretStoreRef:
      name: flyway-secret-store
      kind: SecretStore
    targetSecret:
      name: ""  # Empty, should default to ".Values.name-flyway" (test-svc-flyway)
      creationPolicy: Merge
      deletionPolicy: Retain
    data:
      - secretKey: FLYWAY_USER
        remoteRef:
          key: /flyway/credentials
          property: username
