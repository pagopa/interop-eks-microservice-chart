# Test case 2 – Single host with multiple paths
# Expected: one Ingress rule for api.example.com containing two distinct
#           path entries (/api and /health) under the same host block.
name: test
namespace: test
techStack: nodejs

deployment:
  image:
    repository: nginx
    tag: stable

ingress:
  create: true
  type: generic
  ingressClassName: nginx
  rules:
    - host: api.example.com
      path: /api
      pathType: Prefix
    - host: api.example.com
      path: /health
      pathType: Exact
