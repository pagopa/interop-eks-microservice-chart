# Test case: migrationPaths con azione repair only.
# Verifica che quando solo executeFlywayRepair è true e executeFlywayMigrate è false,
# INTERNAL_FLYWAY_ACTION venga impostato a "repair" nel Deployment.
name: "flyway-repair-only-service"
namespace: "test-namespace"
techStack: "nodejs"

serviceAccount:
  roleArn: "arn:aws:iam::000000000:role/flyway-repair-only-service"

service:
  create: true
  containerPort: 8080
  portName: http

deployment:
  replicas: 1
  image:
    repositoryPrefix: "000000000000.dkr.ecr.eu-central-1.amazonaws.com"
    tag: "1.0.0"
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  flywayInitContainer:
    create: true
    image:
      repositoryName: "interop-flyway-migrations"
    # Only repair -> INTERNAL_FLYWAY_ACTION = "repair"
    executeFlywayMigrate: false
    executeFlywayRepair: true
    migrationPaths: "/flyway_migrationpaths_repair_only/migrations/v1_migrations"
    env:
      FLYWAY_URL: "jdbc:postgresql://$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
      POSTGRES_HOST: "db-host.example.com"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "mydb"
    envFromSecrets:
      FLYWAY_USER: "postgres-secret.POSTGRES_USR"
      FLYWAY_PASSWORD: "postgres-secret.POSTGRES_PSW"
