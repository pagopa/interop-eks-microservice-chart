# Base values shared by all serviceaccount test cases.
# Each test case file overrides only the serviceAccount section.

name: test-svc
namespace: test-ns
techStack: nodejs

service:
  create: false

deployment:
  replicas: 1
  image:
    repositoryPrefix: "library"
    repositoryName: busybox
    tag: "latest"
    imagePullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "50m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"
