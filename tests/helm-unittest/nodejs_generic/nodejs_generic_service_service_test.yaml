suite: nodejs generic service service
templates:
  - templates/service.yaml

tests:
  - it: renders service with primary and additional ports
    values:
      - nodejs_generic_service.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: nodejs-service
      - equal:
          path: spec.ports[0].port
          value: 8807
      - equal:
          path: spec.ports[1].port
          value: 9095
      - equal:
          path: spec.ports[2].targetPort
          value: 8558
      - equal:
          path: spec.selector.app
          value: nodejs-service
