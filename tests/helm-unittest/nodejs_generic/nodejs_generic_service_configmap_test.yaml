suite: nodejs generic service configmap
templates:
  - templates/configmap.yaml

tests:
  - it: renders configmap with templated values resolved
    values:
      - nodejs_generic_service.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap
      - equal:
          path: data.EXTERNAL
          value: some_value
      - equal:
          path: data.POSTGRES_DB_CM
          value: postgres_db
      - equal:
          path: data.POSTGRES_SCHEMA
          value: test-namespace_myschema
