suite: nodejs generic service serviceaccount
templates:
  - templates/serviceaccount.yaml

tests:
  - it: renders serviceaccount with the expected role arn annotation
    values:
      - ../values/nodejs_generic_service/nodejs_generic_service.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: nodejs-service
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::000000000:role/interop-iam-service-dev-nodejs-service

