# Test case: immagine Flyway con solo digest (senza tag).
# Verifica che quando è presente il digest, il tag venga ignorato e
# l'immagine sia costruita nel formato:
#   <repositoryPrefix>/<repositoryName>@<digest>
# senza alcun ":tag" nel riferimento all'immagine.
name: "flyway-custom-image-digest-service"
namespace: "test-namespace"
techStack: "nodejs"

serviceAccount:
  roleArn: "arn:aws:iam::000000000:role/flyway-custom-image-digest-service"

service:
  create: true
  containerPort: 8080
  portName: http

deployment:
  replicas: 1
  image:
    repositoryPrefix: "000000000000.dkr.ecr.eu-central-1.amazonaws.com"
    tag: "main-app-1.0.0"
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  flywayInitContainer:
    create: true
    image:
      repositoryName: "interop-flyway-migrations"
      # Only digest set, no tag -> tag is suppressed by template
      # Expected image: 000000000000.dkr.ecr.eu-central-1.amazonaws.com/interop-flyway-migrations@sha256:abc...
      digest: "sha256:deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef00000001"
    executeFlywayMigrate: true
    executeFlywayRepair: false
    migrationPaths: "/migrations/domain_a/v1_migrations"
    env:
      FLYWAY_URL: "jdbc:postgresql://$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
      POSTGRES_HOST: "db-host.example.com"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "mydb"
    envFromSecrets:
      FLYWAY_USER: "postgres-secret.POSTGRES_USR"
      FLYWAY_PASSWORD: "postgres-secret.POSTGRES_PSW"
