# Test case: migrationPaths con un singolo path.
# Verifica che INTERNAL_FLYWAY_MIGRATIONS_PATHS venga popolato con un singolo path
# e che non venga montato alcun volume (nessun migrationsConfigmap).
# Azione Flyway: migrate only.
name: "flyway-single-path-service"
namespace: "test-namespace"
techStack: "nodejs"

serviceAccount:
  roleArn: "arn:aws:iam::000000000:role/flyway-single-path-service"

service:
  create: true
  containerPort: 8080
  portName: http

deployment:
  replicas: 1
  image:
    repositoryPrefix: "000000000000.dkr.ecr.eu-central-1.amazonaws.com"
    tag: "1.0.0"
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  flywayInitContainer:
    create: true
    image:
      repositoryName: "interop-flyway-migrations"
    executeFlywayMigrate: true
    executeFlywayRepair: false
    # Single directory path
    migrationPaths: "/flyway_migrationpaths_single/migrations/v1_migrations"
    env:
      FLYWAY_URL: "jdbc:postgresql://$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
      POSTGRES_HOST: "db-host.example.com"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "mydb"
    envFromSecrets:
      FLYWAY_USER: "postgres-secret.POSTGRES_USR"
      FLYWAY_PASSWORD: "postgres-secret.POSTGRES_PSW"
