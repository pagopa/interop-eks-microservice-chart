suite: keda paused
templates:
  - templates/scaledobject.yaml
values:
  - keda-paused-values-base.yaml

tests:
  - it: renders a ScaledObject with paused annotation set to true
    values:
      - paused-true.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ScaledObject
      - equal:
          path: metadata.annotations["autoscaling.keda.sh/paused"]
          value: "true"
      - equal:
          path: spec.scaleTargetRef.name
          value: test-keda-paused

  - it: renders a ScaledObject with paused annotation set to false
    values:
      - paused-false.yaml
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.annotations["autoscaling.keda.sh/paused"]
          value: "false"
      - equal:
          path: spec.minReplicaCount
          value: 1
      - equal:
          path: spec.maxReplicaCount
          value: 2

  - it: defaults paused annotation to false when omitted
    values:
      - paused-omitted.yaml
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.annotations["autoscaling.keda.sh/paused"]
          value: "false"
      - equal:
          path: spec.triggers[0].type
          value: cpu
      - equal:
          path: spec.triggers[0].metadata.value
          value: "50"
