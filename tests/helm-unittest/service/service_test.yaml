suite: service
templates:
  - templates/service.yaml
values:
  - ../common/base.yaml

tests:
  - it: renders a ClusterIP service by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-svc
      - equal:
          path: spec.type
          value: ClusterIP

  - it: exposes the configured service port and selector
    asserts:
      - equal:
          path: spec.ports[0].name
          value: http
      - equal:
          path: spec.ports[0].port
          value: 8083
      - equal:
          path: spec.ports[0].targetPort
          value: 8083
      - equal:
          path: spec.selector.app
          value: test-svc

  - it: allows overriding the service type
    set:
      service.type: NodePort
    asserts:
      - equal:
          path: spec.type
          value: NodePort
