suite: serviceaccount failures
templates:
  - templates/serviceaccount.yaml
values:
  - serviceaccount-values-base.yaml

tests:
  - it: fails schema validation when create is not boolean
    values:
      - fail-case-1-invalid-create-type.yaml
    asserts:
      - failedTemplate: {}
          #errorPattern: "at '/serviceAccount/create': got string, want boolean"

  - it: fails schema validation when roleArn is not a string or null
    values:
      - fail-case-2-invalid-rolearn-type.yaml
    asserts:
      - failedTemplate: {}
          #errorPattern: "at '/serviceAccount/roleArn': got number, want null or string"

  - it: fails schema validation when an unsupported property is provided
    values:
      - fail-case-3-invalid-additional-property.yaml
    asserts:
      - failedTemplate: {}
          #errorPattern: "at '/serviceAccount': additional properties 'invalidProperty' not allowed"

  - it: fails schema validation when roleArn is an array
    values:
      - fail-case-4-invalid-rolearn-as-array.yaml
    asserts:
      - failedTemplate: {}
          #errorPattern: "at '/serviceAccount/roleArn': got array, want null or string"
