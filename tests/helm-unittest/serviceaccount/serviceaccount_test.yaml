suite: serviceaccount
templates:
  - templates/serviceaccount.yaml
values:
  - serviceaccount-values-base.yaml

tests:
  - it: does not render ServiceAccount when creation is disabled
    values:
      - serviceaccount-disabled.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders ServiceAccount without role annotation when roleArn is not provided
    values:
      - serviceaccount-without-rolearn.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: test-svc
      - notExists:
          path: metadata.annotations

  - it: renders ServiceAccount with AWS IRSA annotation when roleArn is provided
    values:
      - serviceaccount-with-rolearn.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789012:role/test-role
