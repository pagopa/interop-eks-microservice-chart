suite: frontend serviceaccount
templates:
  - templates/serviceaccount.yaml

tests:
  - it: renders the frontend serviceaccount with the IRSA role annotation
    values:
      - ../values/frontend/frontend.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: frontend-service
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::000000000:role/frontend-service
