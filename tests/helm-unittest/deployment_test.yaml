suite: deployment
templates:
  - templates/deployment.yaml
values:
  - values/base.yaml

tests:
  - it: renders a Deployment for nodejs services
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: test-svc
      - equal:
          path: metadata.namespace
          value: test-namespace

  - it: renders the configured image, replicas and resources
    asserts:
      - equal:
          path: spec.replicas
          value: 2
      - equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/library/nginx:1.27.0
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 128Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 200m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 256Mi

  - it: binds the service account and the declared service port
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: test-svc
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: http
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8083

  - it: allows overriding the replica count
    set:
      deployment.replicas: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3
