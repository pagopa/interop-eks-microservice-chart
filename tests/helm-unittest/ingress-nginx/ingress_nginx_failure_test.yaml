suite: ingress nginx failures
templates:
  - templates/ingress-generic.yaml

tests:
  - it: fails schema validation when ingress type is missing
    values:
      - fail-case-1-missing-type.yaml
    asserts:
      - failedTemplate: {}
          #errorPattern: "at '/ingress': 'allOf' failed[\\s\\S]*at '/ingress/type': got null, want string"

  - it: fails schema validation when ingressClassName is missing
    values:
      - fail-case-2-missing-ingressclassname.yaml
    asserts:
      - failedTemplate: {}
          #errorPattern: "at '/ingress': 'allOf' failed[\\s\\S]*at '/ingress/ingressClassName': got null, want string"

  - it: fails schema validation when rules are missing
    values:
      - fail-case-3-missing-rules.yaml
    asserts:
      - failedTemplate: {}
         #errorPattern: "at '/ingress': 'allOf' failed[\\s\\S]*at '/ingress/rules': got null, want array"

  - it: fails schema validation when rules are empty
    values:
      - fail-case-4-empty-rules.yaml
    asserts:
      - failedTemplate: {}
         #errorPattern: "at '/ingress': 'allOf' failed[\\s\\S]*at '/ingress/rules': minItems: got 0, want 1"

  - it: fails schema validation when a rule host is empty
    values:
      - fail-case-5-empty-host.yaml
    asserts:
      - failedTemplate: {}
         #errorPattern: "at '/ingress/rules/0/host': minLength: got 0, want 1"
