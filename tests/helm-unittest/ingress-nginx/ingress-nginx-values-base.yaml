# Base values shared by all ingress-nginx test cases.
# Each test case file overrides only the ingress section.

name: test-svc
namespace: test-ns
techStack: nodejs

serviceAccount:
  create: false

service:
  create: true
  containerPort: 8080
  targetPort: 8080
  portName: http

ingress:
  create: true
  type: generic
  ingressClassName: nginx

deployment:
  replicas: 1
  image:
    repositoryPrefix: "library"
    repositoryName: busybox
    tag: "latest"
    imagePullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "50m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"