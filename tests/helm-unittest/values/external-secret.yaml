externalSecrets:
  create: true
  secretStoreRef:
    name: cluster-secret-store
    kind: ClusterSecretStore
  targetSecret:
    name: fallback-app-secret
  data:
    - secretKey: username
      remoteRef:
        key: "/apps/{{ .Values.name }}/username"
        property: username
    - secretKey: password
      remoteRef:
        key: "/apps/{{ .Values.name }}/password"
        property: password
