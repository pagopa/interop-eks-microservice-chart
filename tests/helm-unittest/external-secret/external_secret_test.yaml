suite: external secret
templates:
  - templates/externalSecret.yaml
values:
  - ../common/base.yaml

tests:
  - it: does not render ExternalSecret when disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: renders ExternalSecret with fallback target and remote refs
    values:
      - external-secret.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - equal:
          path: apiVersion
          value: external-secrets.io/v1
      - equal:
          path: spec.secretStoreRef.name
          value: cluster-secret-store
      - equal:
          path: spec.secretStoreRef.kind
          value: ClusterSecretStore
      - equal:
          path: spec.target.name
          value: fallback-app-secret
      - equal:
          path: spec.data[0].secretKey
          value: username
      - equal:
          path: spec.data[0].remoteRef.key
          value: /apps/test-svc/username
      - equal:
          path: spec.data[0].remoteRef.property
          value: username
      - equal:
          path: spec.data[1].secretKey
          value: password
      - equal:
          path: spec.data[1].remoteRef.key
          value: /apps/test-svc/password
      - equal:
          path: spec.data[1].remoteRef.property
          value: password

  - it: omits remoteRef.property when not set
    values:
      - external-secret-no-property.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - equal:
          path: spec.data[0].secretKey
          value: token
      - equal:
          path: spec.data[0].remoteRef.key
          value: /apps/test-svc/token
      - notExists:
          path: spec.data[0].remoteRef.property
