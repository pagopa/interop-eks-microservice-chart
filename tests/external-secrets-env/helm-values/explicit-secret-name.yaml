externalSecrets:
  create: true
  targetSecret:
    name: app-secrets
  secretStoreRef:
    name: app-secret-store
    kind: SecretStore
  data:
    - secretKey: API_KEY
      remoteRef:
        key: /app/secrets
        property: api-key
    - secretKey: DB_PASSWORD
      remoteRef:
        key: /app/secrets
        property: db-password
