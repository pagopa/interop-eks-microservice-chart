# Base values shared by all keda-paused test cases.
# Each test case file overrides only autoscaling.keda.paused.

name: test-keda-paused
namespace: test-ns
techStack: nodejs

service:
  create: false

deployment:
  replicas: 1
  image:
    repositoryPrefix: "library"
    repositoryName: busybox
    tag: "latest"
    imagePullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "50m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

autoscaling:
  keda:
    create: true
    minReplicaCount: 1
    maxReplicaCount: 2
    pollingInterval: 30
    cooldownPeriod: 60
    triggers:
      - type: cpu
        metadata:
          value: "50"
