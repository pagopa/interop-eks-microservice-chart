{{- if and .Values.externalSecrets .Values.externalSecrets.container .Values.externalSecrets.container.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "interop-eks-microservice-chart.render-template" (dict "value" (.Values.externalSecrets.container.targetSecret.name | default .Values.name) "context" $) }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "interop-eks-microservice-chart.labels" . | nindent 4 }}
  annotations:
    externalsecret/secret-data-hash: {{ include "externalsecrets.contractMarker" (dict "data" .Values.externalSecrets.container.data) }}
type: Opaque
stringData: {}
{{- end }}

