{{- if and .Values.externalSecrets .Values.externalSecrets.initContainer .Values.externalSecrets.initContainer.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "interop-eks-microservice-chart.render-template" (dict "value" (.Values.externalSecrets.initContainer.targetSecret.name | default (printf "%s-flyway" .Values.name)) "context" $) }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "interop-eks-microservice-chart.labels" . | nindent 4 }}
  annotations:
    externalsecret/secret-data-hash: {{ include "externalsecrets.contractMarker" (dict "data" .Values.externalSecrets.initContainer.data) }}
type: Opaque
stringData: {}
{{- end }}

