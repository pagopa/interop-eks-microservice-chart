# Default values for interop-eks-microservice-chart.

# -- Name of the service that will be deployed on K8s cluster
name:

# -- Namespace hosting the service that will be deployed on K8s cluster
namespace:

# -- (enum) Defines the technology used to develop the container. The following values are allowed: [ "nodejs", "frontend"]
techStack:

# -- (bool) Enable Resources lookup on K8s cluster to resolve referenced values
enableLookup: true

serviceAccount:
  # -- (bool) Enable ServiceAccount creation
  create: true
  # -- (string) ServiceAccount roleARN
  roleArn:

service:
  # -- (object) ALB healthcheck config
  albHealthcheck:
    path:
    port:
    successCodes:
    protocol:
  # -- Enable K8s Service deployment generation
  create: false
  # -- (enum) K8s Service type, allowed values: [ "ClusterIP", "NodePort" ]
  type: "ClusterIP"
  monitoringPort: 9095
  managementPort: 8558
  # -- (string) Service port name
  portName:
  containerPort:
  targetPort:
  # -- Enable container monitoring port
  enableMonitoring: true
  # -- Enable container management port
  enableManagement: true
  # -- (string) Target Group ARN for the service, used to create a TargetGroupBinding
  targetGroupArn:
  # -- (string) Target type for the target group, allowed values: [ "instance", "ip" ]
  targetType:
  # -- (string) IP address type for the target group, allowed values: [ "ipv4", "ipv6" ]
  ipAddressType:

ingress:
  # -- Enable K8s Ingress deployment generation
  # -- ingress.create and service.targetGroupArn must be mutually exclusive.
  create: false
  # -- (string) Group name for ALB Ingresses, used to associate multiple ingresses to the same ALB when using AWS Load Balancer Controller; used when ingress.type is "alb"
  groupName: "interop-be"
  # -- (int) ALB group order annotation value (`alb.ingress.kubernetes.io/group.order`); optional, used when ingress.type is "alb". Can be 0.
  groupOrder:
  # -- (string) Hostname for the ALB ingress rule; used when ingress.type is "alb"
  host:
  # -- (string) Path prefix for the ALB ingress rule; used when ingress.type is "alb"
  applicationPath:
  ingressClassName:
  type:
  # -- (list) list of annotations to apply to the Ingress resource
  annotations: {}
  # -- (list) List of ingress rules; required when ingress.type is "generic", must be null (~) or omitted when type is "alb".
  # Each item must contain: host (string), path (string), pathType (Prefix|Exact|ImplementationSpecific).
  # Example:
  #   rules:
  #     - host: api.example.com
  #       path: /api
  #       pathType: Prefix
  #     - host: api.example.com
  #       path: /health
  #       pathType: Exact
  rules: ~

deployment:
  # -- (bool) Enable annotation generation for referenced configmaps and secrets
  enableRolloutAnnotations: false
  metadata:
    # -- (object) Additional annotations to apply to Deployment metadata
    annotations:
    # -- (object) Additional labels to apply to Deployment metadata
    labels:
  podTemplateMetadata:
    # -- (object) Additional annotations to apply to Pod `spec.template.metadata`
    annotations:
    # -- (object) Additional labels to apply to Pod `spec.template.metadata`
    labels:
  # -- (int) Number of desired replicas for the service being deployed
  replicas:
  # -- (object) Rollout strategy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0%
  # -- (object) Pod securityContext, applied to main container
  securityContext:
    allowPrivilegeEscalation: false
  # -- (object) Microservice image configuration
  image:
    # -- (string) Image pull policy
    imagePullPolicy: Always
    # -- (string) Image repository
    repositoryPrefix:
    # -- (string) Alternative image name
    repositoryName:
    # -- (string) Image tag
    tag:
    # -- (string) Image digest
    digest:
  # -- (object) K8s container resources requests and limits
  resources:
    requests:
      cpu:
      memory:
    limits:
      cpu:
      memory:
  # -- (object) List of environment variables for a container, specifying a value directly for each named variable
  env:
  # -- (object) List of environment variables for a container, specifying a key from a Configmap for each named variable (k8s equivalent of envFrom.configMapRef)
  envFromConfigmaps: {}
  # -- (object) List of environment variables for a container, specifying a key from a Secret for each named variable (k8s equivalent of envFrom.secretRef)
  envFromSecrets: {}
  # -- (object) List of pod fields used as values for environment variablesenvironment variables for a container, specifying a key from a Secret for each named variable (k8s equivalent of env.valueFrom.fieldRef.fieldPath)
  envFromFieldRef: {}
  postStartHook:
    # -- (bool) Enable postStart hook
    create: false
    # -- (array) Command to run in the postStart hook
    command:
  preStopHookGracefulTermination:
    # -- (bool) Enable preStop hook for graceful termination
    create: true
    # -- (int) Duration in seconds for the preStop hook to complete
    durationSeconds: 30
  flywayInitContainer:
    create: false
    image:
      # -- (string) defaults to deployment repositoryPrefix if not set
      repositoryPrefix:
      # -- (string) must be set if create is true, e.g. "interop-flyway-migrations"
      repositoryName:
      # -- (string) defaults to deployment image tag if not set
      tag:
      # -- (string) if set, overrides tag with the specified digest
      digest:
      # -- (string) Image pull policy for the init container; if unset, the Kubernetes default applies
      imagePullPolicy:
    # -- (bool) execute Flyway migrate command to apply migrations to the database
    executeFlywayMigrate: true
    # -- (bool) execute Flyway repair command to recompute applied migrations metadata; useful for whitespace changes.
    executeFlywayRepair: false
    # -- (string) Flyway container image version
    version: "8.2.3"
    # -- (bool) Enable Flyway to download Redshift jdbc driver
    downloadRedshiftDriver: false
    # -- Configmap with migrations
    migrationsConfigmap:
    # -- (string) List of comma separated paths to migration files or directories containing migration files (e.g. "/migrations/a_directory,v1_migration.sql,/migrations/b_directory")
    migrationPaths:
    # -- (object) List of environment variables for a container, specifying a value directly for each named variable
    env: {}
    # -- (object) List of environment variables for a container, specifying a key from a Configmap for each named variable (k8s equivalent of envFrom.configMapRef)
    envFromConfigmaps: {}
    # -- (object) List of environment variables for a container, specifying a key from a Secret for each named variable (k8s equivalent of envFrom.secretRef)
    envFromSecrets: {}
    # -- (object) List of pod fields used as values for environment variablesenvironment variables for a container, specifying a key from a Secret for each named variable (k8s equivalent of env.valueFrom.fieldRef.fieldPath)
    envFromFieldRef: {}

autoscaling:
  # -- KEDA autoscaling configuration
  keda:
    # -- (bool) Enable KEDA autoscaling
    create: false
    # -- (bool) Pause KEDA autoscaling by setting autoscaling.keda.sh/paused annotation on ScaledObject
    paused: false
    # -- (int) minimum replica count
    minReplicaCount:
    # -- (int) maximum replica count
    maxReplicaCount:
    # -- (int) metrics polling interval in seconds
    pollingInterval:
    # -- (int) cooldown period in seconds
    cooldownPeriod:
    # -- (list) triggers configuration, refer to https://keda.sh/docs/2.17/scalers/
    triggers:

externalSecrets:
  # -- (bool) Enable ExternalSecret creation
  create: false
  # -- (string) Refresh interval for the secret (e.g., "1h", "30m")
  refreshInterval: "0"
  # -- (string) Refresh policy for the secret, allowed values: [ "OnChange", "Interval" ]
  refreshPolicy: "OnChange"
  # -- (object) Reference to SecretStore or ClusterSecretStore
  secretStoreRef:
    name: ""
    kind: SecretStore  # or ClusterSecretStore
  # -- (object) Target Kubernetes Secret configuration
  targetSecret:
    # -- (string) Name of the target secret (defaults to microservice name)
    name: ""
    # -- (string) Creation policy: Owner, Orphan, Merge, None
    creationPolicy: Merge
    # -- (string) Deletion policy: Retain, Delete
    deletionPolicy: Retain
  # -- (list) List of individual secret keys to sync from external secret manager
  data: []
    # - secretKey: username
    #   remoteRef:
    #     key: /path/to/secret
    #     property: username
    #     version: v1                       # (string) Version identifier for the remote secret
    #     conversionStrategy: Default
    #     decodingStrategy: None
    # - secretKey: password
    #   remoteRef:
    #     key: /path/to/secret
    #     property: password
    #     version: v1
